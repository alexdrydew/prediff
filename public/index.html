<!doctype html>
<!--
  TEMPORARY PLACEHOLDER UI.
  This page exists only so the backend review loop can be exercised end-to-end
  (manifest → hunks → comments → submit → SSE refresh). The real frontend
  (Vite + React, virtualized, per ARCHITECTURE.md §5) is being designed
  separately and will replace this file entirely.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>prediff (placeholder UI)</title>
<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px;
         margin: 0; background: #fff; color: #111; }
  header { padding: 10px 16px; border-bottom: 1px solid #ddd; display: flex;
           gap: 16px; align-items: center; position: sticky; top: 0; background: #fafafa; }
  header .grow { flex: 1; }
  button { font: inherit; cursor: pointer; }
  main { display: flex; }
  #files { width: 40%; max-width: 640px; border-right: 1px solid #ddd; padding: 8px; }
  #comments { flex: 1; padding: 8px 16px; }
  .file { margin-bottom: 4px; }
  .file > .head { cursor: pointer; padding: 2px 4px; background: #f3f3f3; }
  .file .stats { color: #666; }
  .add { color: #060; } .del { color: #900; }
  table.hunks { border-collapse: collapse; width: 100%; }
  table.hunks td { padding: 0 6px; white-space: pre-wrap; vertical-align: top; }
  td.ln { color: #999; text-align: right; user-select: none; cursor: pointer; min-width: 3em; }
  td.ln:hover { background: #def; }
  tr.add td:last-child { background: #e6ffe6; }
  tr.del td:last-child { background: #ffe6e6; }
  tr.hunkhead td { background: #eef; color: #55a; padding: 2px 6px; }
  .comment { border: 1px solid #ccc; border-left: 4px solid #c90; padding: 6px 8px; margin: 6px 0; }
  .comment.resolved { border-left-color: #2a2; opacity: 0.75; }
  .comment.outdated { border-left-color: #999; background: #f6f6f6; }
  .comment .meta { color: #666; font-size: 11px; }
  .reply { margin-left: 12px; color: #345; }
  #status { color: #666; }
  .nonewline { color: #a50; }
</style>
</head>
<body>
<header>
  <strong>prediff</strong>
  <span id="status">loading…</span>
  <span class="grow"></span>
  <button id="refresh">Refresh diff</button>
  <button id="finish">Finish review (send to agent)</button>
</header>
<main>
  <div id="files"></div>
  <div id="comments"><h3>Comments</h3><div id="commentList"></div></div>
</main>
<script>
"use strict";
/* Temporary vanilla-JS client. No virtualization, no highlighting — by design. */

const $ = (id) => document.getElementById(id);
const expanded = new Set(); // file paths whose hunks are shown

async function api(route, opts) {
  const res = await fetch(route, opts);
  if (!res.ok) throw new Error((await res.json()).error || res.statusText);
  return res.json();
}

async function loadAll() {
  const [manifest, session] = await Promise.all([api("/api/diff"), api("/api/session")]);
  $("status").textContent =
    `range=${manifest.range} gen=${manifest.generation} ` +
    `${manifest.files.length} files +${manifest.additions} -${manifest.deletions} ` +
    `state=${session.review_state}`;
  renderFiles(manifest.files);
  renderComments(session.comments);
}

function renderFiles(files) {
  const root = $("files");
  root.textContent = "";
  for (const f of files) {
    const div = document.createElement("div");
    div.className = "file";
    const head = document.createElement("div");
    head.className = "head";
    const rename = f.old_path ? `${f.old_path} → ` : "";
    head.innerHTML =
      `▸ ${rename}<strong>${esc(f.path)}</strong> ` +
      `<span class="stats">[${f.status}${f.binary ? ", binary" : ""}${f.large ? ", large" : ""}] ` +
      `<span class="add">+${f.additions}</span> <span class="del">-${f.deletions}</span></span>`;
    const body = document.createElement("div");
    head.onclick = () => toggleFile(f, body);
    div.append(head, body);
    root.append(div);
    if (expanded.has(f.path)) toggleFile(f, body, true);
  }
}

async function toggleFile(f, body, force) {
  if (body.childNodes.length && !force) {
    body.textContent = "";
    expanded.delete(f.path);
    return;
  }
  expanded.add(f.path);
  if (f.binary) { body.textContent = "(binary file)"; return; }
  const diff = await api(`/api/diff/file?path=${encodeURIComponent(f.path)}`);
  if (diff.large) {
    const btn = document.createElement("button");
    btn.textContent = "large diff — load anyway";
    btn.onclick = async () => {
      const full = await api(`/api/diff/file?path=${encodeURIComponent(f.path)}&force=1`);
      body.textContent = "";
      body.append(renderHunks(f, full.hunks));
    };
    body.textContent = "";
    body.append(btn);
    return;
  }
  body.textContent = "";
  body.append(renderHunks(f, diff.hunks));
}

function renderHunks(f, hunks) {
  const table = document.createElement("table");
  table.className = "hunks";
  for (const h of hunks) {
    const tr = document.createElement("tr");
    tr.className = "hunkhead";
    tr.innerHTML = `<td colspan="3">@@ -${h.old_start},${h.old_lines} +${h.new_start},${h.new_lines} @@ ${esc(h.header)}</td>`;
    table.append(tr);
    for (const l of h.lines) {
      const row = document.createElement("tr");
      row.className = l.kind === "add" ? "add" : l.kind === "del" ? "del" : "";
      const oldTd = document.createElement("td");
      const newTd = document.createElement("td");
      oldTd.className = newTd.className = "ln";
      oldTd.textContent = l.old_line ?? "";
      newTd.textContent = l.new_line ?? "";
      // Click a line number to leave a comment on that side/line.
      oldTd.onclick = () => l.old_line && addComment(f.path, l.old_line, "old");
      newTd.onclick = () => l.new_line && addComment(f.path, l.new_line, "new");
      const text = document.createElement("td");
      text.textContent = (l.kind === "add" ? "+" : l.kind === "del" ? "-" : " ") + l.text;
      if (l.no_newline) text.innerHTML += ' <span class="nonewline">⛔ no newline at EOF</span>';
      row.append(oldTd, newTd, text);
      table.append(row);
    }
  }
  return table;
}

async function addComment(file, line, side) {
  const text = prompt(`Comment on ${file}:${line} (${side}):`);
  if (!text) return;
  await api("/api/comments", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ file, line, side, text }),
  });
  await loadAll();
}

function renderComments(comments) {
  const root = $("commentList");
  root.textContent = "";
  if (!comments.length) { root.textContent = "none yet — click a line number"; return; }
  for (const c of comments) {
    const div = document.createElement("div");
    div.className = `comment ${c.state}`;
    const range = c.line === c.end_line ? c.line : `${c.line}-${c.end_line}`;
    div.innerHTML =
      `<div class="meta">[${c.state}] ${esc(c.file)}:${range} (${c.side}) gen ${c.generation}</div>` +
      `<div>${esc(c.text)}</div>` +
      c.replies.map((r) => `<div class="reply">↳ (${r.from}) ${esc(r.text)}</div>`).join("");
    const del = document.createElement("button");
    del.textContent = "delete";
    del.onclick = async () => { await api(`/api/comments/${c.id}`, { method: "DELETE" }); loadAll(); };
    div.append(del);
    root.append(div);
  }
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
}

$("finish").onclick = async () => {
  await api("/api/review/submit", { method: "POST" });
  loadAll();
};
$("refresh").onclick = async () => {
  await api("/api/refresh", { method: "POST" });
  loadAll();
};

// SSE-driven refresh: any server-side change reloads manifest + comments.
const events = new EventSource("/events");
for (const ev of ["generation", "comment.created", "comment.updated", "comment.resolved",
                  "comment.deleted", "review.submitted", "session.changed"]) {
  events.addEventListener(ev, () => loadAll());
}

loadAll().catch((err) => { $("status").textContent = `error: ${err.message}`; });
</script>
</body>
</html>
