      rel="stylesheet"
    />
    <script>
      // Stamp the theme before first paint. Manual toggle pins a choice in
      // localStorage ("prediff.theme"); otherwise follow the OS preference.
      (function () {
        var theme;
        try {
          var raw = localStorage.getItem("prediff.theme");
          if (raw !== null) theme = JSON.parse(raw);
        } catch (e) {
          /* ignore */
        }
        if (theme !== "light" && theme !== "dark") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
